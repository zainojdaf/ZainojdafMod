<head>
	<title id="tabTitle">Featured</title>
	<meta charset="utf-8">
	<link href="assets/css/browser.css" type="text/css" rel="stylesheet">
	<style>
    #searchBox::-webkit-scrollbar { display: none; }
    #searchBox { scrollbar-width: none; -ms-overflow-style: none; }
    img { -webkit-user-drag: none; user-select: none; }
    #pageJumpBtn {
      position: absolute; top: 1.5%; right: 2%;
      width: 8vh; height: 8vh;
      background: url('assets/lightbluebox.png') center/100% 100% no-repeat;
      border: 0;
      box-shadow: none;
      border-radius: 1vh; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    #pageJumpBtn h1 { font-size: 5vh; margin: 0; color: white; -webkit-text-stroke: 0.2vh black; }
    #refreshBtn {
      position: absolute; bottom: 2%; right: 2%;
    }
    #infoBtn {
      position: absolute; bottom: 2%; left: 2%;
    }
</style>
</head>

<body class="levelBG" style="overflow:hidden">

<div id="everything" style="overflow: auto;">

	<!-- info popup -->
	<div class="popup" id="infoPopup">
		<div class="fancybox bounce center supercenter" style="width: 80vh; height: 42%">
			<h2 class="smaller center" style="font-size: 5vh; margin-bottom: 3%">Featured</h2>
			<p class="bigger center" style="line-height: 4.5vh; padding: 0 5%">
				Levels on this list have been rated and featured by RobTop.
				The extra visual around the difficulty face indicates how much he likes a specific level.
				In order of increasing quality:<br><br>
				<span style="color:#ffd966">Featured</span>,
				<span style="color:#ff8c00">Epic</span>,
				<span style="color:#da70d6">Legendary</span>, and
				<span style="color:#00ffff">Mythic</span>.
			</p>
			<div style="position:absolute; bottom: 0%; left: 50%; transform:translateX(-50%); display:flex; align-items:center; justify-content:center; gap:2vh">
				<img src="assets/ok.png" height="100%" class="gdButton closeWindow" style="height:6vh" onclick="$('#infoPopup').hide()">
				<img src="assets/gold-info.png" height="100%" class="gdButton" style="height:6vh" onclick="window.open('https://boomlings.com/GDRating','_blank')">
			</div>
		</div>
	</div>

	<!-- page jump popup -->
	<div class="popup" id="pagePopup">
		<div class="brownBox bounce center supercenter" style="width: 60vh; height: 40%">
			<img class="gdButton" src="assets/close.png" width="13%" style="position:absolute;top:-13%;left:-5.5vh" onclick="$('#pagePopup').hide()">
			<h2 class="smaller center" style="font-size: 5vh; margin-bottom: 4%">Go to Page</h2>

			<div style="display:flex; align-items:center; justify-content:center; gap:4vh; margin-bottom:4%">
				<img src="assets/whitearrow-left.png" class="gdButton" style="height:6vh" onclick="jumpPageVal = Math.max(1, jumpPageVal-1); $('#jumpInput').text(jumpPageVal)">

				<div style="background:#6b3a1f; border-radius:1vh; padding:1.8vh 6vh; min-width:10vh; text-align:center; box-shadow: inset 0 0 0.4vh rgba(0,0,0,0.25)">
					<h1 id="jumpInput" style="font-size:5vh; margin:0" contenteditable="true" oninput="jumpPageVal=parseInt(this.innerText)||1">1</h1>
				</div>

				<img src="assets/whitearrow-right.png" class="gdButton" style="height:6vh" onclick="jumpPageVal = jumpPageVal+1; $('#jumpInput').text(jumpPageVal)">
			</div>

			<img src="assets/ok.png" class="gdButton center" style="height:7vh" onclick="goToPage(jumpPageVal)">
		</div>
	</div>

	<div style="position:absolute; bottom: 0%; left: 0%; width: 100%">
		<img class="cornerPiece" src="assets/corner.png" width=7%;>
	</div>
	<div style="position:absolute; bottom: 0%; right: 0%; width: 100%; text-align: right;">
		<img class="cornerPiece" src="assets/corner.png" width=7%; style="transform: scaleX(-1)">
	</div>

	<div id="searchBox" class="supercenter dragscroll">
		<div style="height: 4.5%"></div>
	</div>

	<div class="epicbox supercenter gs" style="width: 120vh; height: 80%; pointer-events: none;"></div>

	<div class="center" style="position:absolute; top: 1.5%; left: 0%; right: 0%; width: 100%">
		<img src="assets/header/featuredLabel.png" style="height: 13vh; image-rendering: smooth;">
	</div>

	<div style="text-align: right; position:absolute; top: 1%; right: 12%">
		<h2 class="smaller" style="font-size: 3.5vh; color:#ffd966" id="pagenum"></h2>
	</div>

	<!-- page jump button -->
	<div id="pageJumpBtn" onclick="$('#jumpInput').text(jumpPageVal); $('#pagePopup').show(); setTimeout(()=>$('#jumpInput').focus(),50)">
		<h1 id="pageNumDisplay">1</h1>
	</div>

	<!-- back button -->
	<div style="position:absolute; top: 2%; left: 1.5%; width: 10%; height: 25%; pointer-events: none">
		<img class="gdButton yesClick" id="backButton" src="assets/back.png" height="30%" onclick="closeFeaturedPage()">
	</div>

	<!-- left/right page arrows -->
	<div style="position: absolute; left: 7%; top: 45%; height: 10%;">
		<img class="gdButton" id="pageDown" style="display: none" src="assets/arrow-left.png" height="90%">
	</div>
	<div style="position: absolute; right: 7%; top: 45%; height: 10%;">
		<img class="gdButton" id="pageUp" style="display: none" src="assets/arrow-right.png" height="90%">
	</div>

	<!-- refresh button bottom right -->
	<div id="refreshBtn">
		<img src="assets/refresh.png" height="100" class="gdButton" onclick="pageCache={}; Append(true)">
	</div>

	<!-- info button bottom left -->
	<div id="infoBtn">
		<img src="assets/info.png" height="80" class="gdButton" onclick="$('#infoPopup').show()">
	</div>

	<div class="supercenter" id="loading" style="height: 10%; top: 47%; display: none;">
		<img class="spin noSelect" src="assets/loading.png" height="105%">
	</div>

	<div id="savedToast" class="center supercenter" style="display:none; top: 90%; background: rgba(0,0,0,0.7); border-radius: 1.5vh; padding: 1vh 3vh; z-index: 50">
		<h3 style="color:#ffd966">Level saved!</h3>
	</div>

</div>

<script type="text/javascript" src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script type="text/javascript" src="dragscroll.js"></script>
<script>
function closeFeaturedPage() {
	window.parent.postMessage({ type: 'WD_CLOSE_SEARCH', returnTo: 'creator' }, '*')
}

$('#pageDown').hide()
$('#pageUp').hide()

let page = 0
let jumpPageVal = 1
let loading = false
let pageCache = {}
let totalCount = 0

function clean(text) {return (text || "").toString().replace(/&/g, "&#38;").replace(/</g, "&#60;").replace(/>/g, "&#62;").replace(/=/g, "&#61;").replace(/"/g, "&#34;").replace(/'/g, "&#39;")}

function fmtNum(n) {
	n = parseInt(n) || 0
	if (n >= 1000000) return (n/1000000).toFixed(1).replace(/\.0$/,'') + 'M'
	if (n >= 1000) return (n/1000).toFixed(1).replace(/\.0$/,'') + 'K'
	return n
}

function updatePageDisplay() {
	$('#pageNumDisplay').text(page + 1)
	jumpPageVal = page + 1
}

function goToPage(p) {
	$('#pagePopup').hide()
	const newPage = Math.max(0, (parseInt(p) || 1) - 1)
	if (newPage === page) return
	page = newPage
	updatePageDisplay()
	Append()
}

// difficulty scaling
function diffScale(x) {
	if (x.mythic || x.legendary) return 'transform:scale(1.5)'
	if (x.epic) return 'transform:scale(1.3)'
	if (x.featured) return 'transform:scale(1.1)'
	return ''
}

// difficulty label
function diffLabel(x) {
	const d = x.difficulty || ''
	if (d.includes('Demon')) return 'Demon'
	return d
}

function Append(firstLoad) {
	loading = true
	$('#searchBox').html('<div style="height: 4.5%"></div>')
	$('#loading').show()

	if (page == 0) $('#pageDown').hide()
	else $('#pageDown').show()

	updatePageDisplay()

	if (pageCache[page]) appendLevels(pageCache[page])
	else fetch(`https://gdbrowser.com/api/search/*?page=${page}&count=10&type=6`)
		.then(r => r.ok ? r.json() : Promise.reject())
		.then(appendLevels)
		.catch(() => { $('#loading').hide(); $('#searchBox').html('<div style="text-align:center;padding:8%"><h1>Could not load results</h1></div>'); loading = false })

	function appendLevels(res) {
		if (res == '-1' || res.length == 0) { $('#loading').hide(); $('#pageUp').hide(); return loading = false }
		pageCache[page] = res
		$('#pageUp').show()

		res.forEach((x, y) => {
			const isPlatformer = !!x.platformer
			const filteredSong = clean((x.songName || '').replace(/[^ -~]/g, '') || x.songName || '')
			const songColor = x.customSong == 0 ? 'blue' : 'whatIfItWasPurple'
			const diffSrc = `assets/difficulties/${x.difficultyFace || 'unrated'}.png`

			// stars or moons
			const ratingCount = isPlatformer ? (x.moons || x.stars || 0) : (x.stars || 0)
			const ratingImg = isPlatformer ? 'assets/moon.png' : 'assets/star.png'
			const ratingTitle = isPlatformer ? 'Moons' : 'Stars'

			// length label
			const lengthLabel = isPlatformer ? 'Plat.' : (x.length || '-')

			const viewBtn = `<img style="margin-bottom:4.5%" class="valign gdButton" src="assets/view.png" height="105%" title="View level" onclick="location.href='level-info.html?id=${clean(String(x.id))}'">` 
			const saveBtn = `<img title="Save level" class="valign gdButton" src="assets/plus.png" height="60%" style="margin-left:1.5vh;cursor:pointer" onclick="saveLevel(event,${clean(String(x.id))},'${clean(x.name)}','${clean(x.author)}','${clean(x.difficultyFace)}',${ratingCount},'${clean(x.difficulty)}',${isPlatformer})">`

			const coinsRow = x.coins > 0 ? `
				${x.coins > 0 ? `<img src="assets/${x.verifiedCoins?'silver':'brown'}coin.png" height="50%" class="help">` : ''}
				${x.coins > 1 ? `<img src="assets/${x.verifiedCoins?'silver':'brown'}coin.png" height="50%" class="help squeezeB">` : ''}
				${x.coins > 2 ? `<img src="assets/${x.verifiedCoins?'silver':'brown'}coin.png" height="50%" class="help squeezeB">` : ''}` : ''

			// diff face top offset
			const diffTop = 6.5 + (y * 33.5) + (x.coins == 0 ? 2.5 : 0)

			$('#searchBox').append(`<div class="searchResult" title="${clean(x.description)}">
				<h1 class="lessspaced pre" style="width:fit-content;padding-right:1%">${clean(x.name || ' ')}</h1>
				<h2 class="pre smaller inline gdButton help"><!--
					-->${(x.accountID != '0') ? `<a style="margin-right:0.66vh" href="https://gdbrowser.com/u/${x.accountID}." target="_blank">By ${x.author || '-'}</a>` : `By ${x.author || '-'}`}</h2>
				<h3 class="lessSpaced help ${!filteredSong?'':''}pre ${songColor}" style="overflow:hidden;max-height:19%;width:fit-content;padding:1% 1% 0% 0%">${filteredSong}</h3>
				<h3 class="lessSpaced" style="width:fit-content">
					<img class="help valign rightSpace" title="Length" src="assets/time.png" height="14%">${lengthLabel}
					<img class="help valign rightSpace" title="Downloads" src="assets/download.png" height="14%">${fmtNum(x.downloads)}
					<img class="help valign rightSpace" title="Likes" src="assets/${x.disliked?'dis':''}like.png" height="14%">${fmtNum(x.likes)}
					${x.orbs != 0 ? `<img class="help valign rightSpace" title="Mana Orbs" src="assets/orbs.png" height="14%">${fmtNum(x.orbs)}` : ''}
				</h3>

<div class="center" style="position:absolute;top:${diffTop}%;left:4.4%;transform:scale(0.82);height:10%;width:12.5%;">
	<img class="help spaced" title="${x.difficulty}" src="${diffSrc}" height="150%" style="margin-bottom:0%;position:relative;z-index:1;${diffScale(x)}">
	<h3 style="margin-top:0.8vh;position:relative;z-index:2;font-size:3.8vh">
		${diffLabel(x)}
	</h3>
	${ratingCount > 0 ? `<h3 class="help" title="${ratingCount} ${ratingTitle.toLowerCase()}" style="position:relative;z-index:2;font-size:3.8vh">${ratingCount}<img class="valign sideSpaceB" src="${ratingImg}" height="40%" style="transform:translateY(-8%)"></h3>` : ''}
	${x.coins > 0 ? `<div style="margin-top:3%;position:relative;z-index:2;">${coinsRow}</div>` : ''}
</div>
				<div class="center" style="position:absolute;right:7%;transform:translateY(-16.25vh);height:10%">
					${viewBtn}${saveBtn}
					<p title="Level ID" style="text-align:right;color:rgba(0,0,0,0.4);font-size:2.2vh;transform:translate(2.8vh,2.5vh)">#${x.id}</p>
				</div>
			</div>`)
		})

		if (firstLoad && res.length > 0) {
			$('#pagenum').text(`1 to ${res.length} of many`)
		}
		$('#searchBox').append('<div style="height:4.5%"></div>').scrollTop(0)
		$('#loading').hide()
		loading = false
	}
}

function saveLevel(e, id, name, author, difficultyFace, stars, difficulty, platformer) {
	e.stopPropagation()
	let saved = []
	try { saved = JSON.parse(localStorage.getItem('wdSavedLevels') || '[]') } catch(err) {}
	if (!saved.some(s => String(s.id) === String(id))) {
		saved.push({ id, name, author, difficultyFace, stars, difficulty, platformer })
		localStorage.setItem('wdSavedLevels', JSON.stringify(saved))
	}
	$('#savedToast').stop(true,true).css('opacity',1).show().delay(1200).fadeOut(400)
}

Append(true)

$('#pageUp').click(function() { if (!loading) { page += 1; Append() } })
$('#pageDown').click(function() { if (!loading && page > 0) { page -= 1; Append() } })

$('.closeWindow').click(function() { $('.popup').hide() })

$(document).keydown(function(k) {
	if (loading) return
	if (k.which == 37 && $('#pageDown').is(':visible')) $('#pageDown').trigger('click')
	if (k.which == 39 && $('#pageUp').is(':visible')) $('#pageUp').trigger('click')
	if (k.keyCode == 27) {
		if ($('.popup').is(':visible')) $('.popup').hide()
		else closeFeaturedPage()
	}
})

$(window).resize(function() {
	if (window.innerHeight > window.innerWidth - 75) $('#everything').hide()
	else $('#everything').show()
})
window.addEventListener('pageshow', function() { window.parent.postMessage({ type: 'WD_IFRAME_ACTIVE' }, '*') })
window.addEventListener('focus', function() { window.parent.postMessage({ type: 'WD_IFRAME_ACTIVE' }, '*') })
$(document).ready(function() { $(window).trigger('resize'); window.parent.postMessage({ type: 'WD_IFRAME_ACTIVE' }, '*') })
</script>
<script src="menu-audio.js"></script>
